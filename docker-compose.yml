version: '3.8'

# desmembrar o account 
# Vai se chamar youfocus 
# desmembrar o checkout do Selpics
# Horus

services:
  # Aplicação Account
  account:
    build:
      context: ./account
      dockerfile: Dockerfile
    container_name: account-laravel
    ports:
      - "8001:8000"
    volumes:
      - ./account:/var/www/html
      - account-storage:/var/www/html/storage
      - account-vendor:/var/www/html/vendor
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=account-database
      - DB_PORT=3306
      - DB_DATABASE=account_db
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=noreply@account.test
      - MAIL_FROM_NAME="Account App"
    depends_on:
      - account-database
      - mailhog
    networks:
      - laravel-network

  # Banco de dados Account
  account-database:
    image: mysql:8.0
    container_name: account-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=account_db
    ports:
      - "33061:3306"
    volumes:
      - account-database-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Aplicação Second
  second:
    build:
      context: ./second
      dockerfile: Dockerfile
    container_name: second-laravel
    ports:
      - "8002:8000"
    volumes:
      - ./second:/var/www/html
      - second-storage:/var/www/html/storage
      - second-vendor:/var/www/html/vendor
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=second-database
      - DB_PORT=3306
      - DB_DATABASE=second_db
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
    depends_on:
      - second-database
    networks:
      - laravel-network

  # Banco de dados Second
  second-database:
    image: mysql:8.0
    container_name: second-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=second_db
    ports:
      - "33062:3306"
    volumes:
      - second-database-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Aplicação Third
  third:
    build:
      context: ./third
      dockerfile: Dockerfile
    container_name: third-laravel
    ports:
      - "8003:8000"
    volumes:
      - ./third:/var/www/html
      - third-storage:/var/www/html/storage
      - third-vendor:/var/www/html/vendor
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=third-database
      - DB_PORT=3306
      - DB_DATABASE=third_db
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
    depends_on:
      - third-database  
    networks:
      - laravel-network

  # Banco de dados Third
  third-database:
    image: mysql:8.0
    container_name: third-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=third_db
    ports:
      - "33063:3306"
    volumes:
      - third-database-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOSTS=account-database,second-database,third-database
      - PMA_PORTS=3306,3306,3306
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
      - UPLOAD_LIMIT=300M
    depends_on:
      - account-database
      - second-database
      - third-database
    networks:
      - laravel-network

  # MailHog
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  account-database-data:
  second-database-data:
  third-database-data:
  account-storage:
  second-storage:
  third-storage:
  account-vendor:
  second-vendor:
  third-vendor:
